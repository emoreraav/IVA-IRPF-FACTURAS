<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FactuControl Pro</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1043/1043431.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #000000;
            --card-bg: rgba(28, 28, 30, 0.7);
            --ios-blue: #0A84FF;
            --hucha-cian: #00BCD4;
            --sueldo-verde: #32D74B;
        }

        body { 
            background-color: var(--bg-dark); 
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            padding-top: env(safe-area-inset-top);
        }

        /* Efecto Glassmorphism iOS */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ios-input {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-size: 17px;
            width: 100%;
            outline: none;
        }

        .ios-input:focus {
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 2px var(--ios-blue);
        }

        .label-mini {
            font-size: 11px;
            font-weight: 700;
            color: #8E8E93;
            text-transform: uppercase;
            margin-bottom: 6px;
            margin-left: 4px;
            letter-spacing: 0.5px;
        }

        .trim-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #8E8E93;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .trim-btn.active {
            background: var(--ios-blue);
            color: white;
            box-shadow: 0 4px 12px rgba(10, 132, 255, 0.3);
        }

        .btn-save {
            background: white;
            color: black;
            font-weight: 700;
            font-size: 17px;
            padding: 18px;
            border-radius: 16px;
            width: 100%;
            transition: transform 0.1s;
        }

        .btn-save:active { transform: scale(0.96); opacity: 0.9; }

        /* Animación suave para el historial */
        .factura-item {
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="pb-10">

    <header class="glass sticky top-0 z-50 p-5 mb-6">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">Nueva Factura</h1>
            <div id="trim-selector" class="flex bg-black/40 rounded-xl p-1 w-44">
                <button onclick="setTrim(1)" id="t1" class="trim-btn">1T</button>
                <button onclick="setTrim(2)" id="t2" class="trim-btn">2T</button>
                <button onclick="setTrim(3)" id="t3" class="trim-btn">3T</button>
                <button onclick="setTrim(4)" id="t4" class="trim-btn">4T</button>
            </div>
        </div>
    </header>

    <main class="px-5 max-w-md mx-auto space-y-5">
        
        <div class="glass rounded-3xl p-6 space-y-4">
            <div>
                <label class="label-mini">Cliente</label>
                <input type="text" id="cliente" list="c-list" class="ios-input" placeholder="Nombre del cliente...">
                <datalist id="c-list">
                    <option value="BLOCK AUDIOVISUALS SL">
                    <option value="ALBA AUDIOVISUALS BARCELONA SL">
                    <option value="SH TECHNICAL CREW S.L.">
                    <option value="LIANTO PRODUCTIONS S.L.">
                </datalist>
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="label-mini">Nº Factura</label>
                    <input type="text" id="nfactura" class="ios-input" placeholder="2026-XX">
                </div>
                <div class="w-1/2">
                    <label class="label-mini">Base (€)</label>
                    <input type="number" id="base" inputmode="decimal" class="ios-input font-bold text-blue-400 text-xl" placeholder="0.00">
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="glass rounded-3xl p-6">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-gray-400 font-medium">Total a Recibir</span>
                    <span id="res-total" class="text-2xl font-bold text-white">0,00 €</span>
                </div>
                <div class="flex justify-between text-xs font-bold text-gray-500 uppercase tracking-widest border-t border-white/5 pt-3">
                    <span>IVA (21%): <span id="res-iva" class="text-gray-300">0,00</span></span>
                    <span>IRPF (15%): <span id="res-irpf" class="text-gray-300">0,00</span></span>
                </div>
            </div>
            
            <div class="bg-[#00BCD4] rounded-3xl p-6 text-white shadow-xl shadow-cyan-950/20">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 class="text-[11px] font-black uppercase tracking-widest opacity-70">Reserva Hucha Total</h3>
                        <p id="res-hucha" class="text-4xl font-black">0,00 €</p>
                    </div>
                    <i class="fas fa-piggy-bank text-3xl opacity-40"></i>
                </div>
                <div class="grid grid-cols-2 gap-4 border-t border-black/10 pt-4">
                    <div>
                        <p class="text-[9px] font-bold uppercase opacity-60">Ahorro IVA (30%)</p>
                        <p id="res-hucha-iva" class="text-lg font-bold">0,00 €</p>
                    </div>
                    <div>
                        <p class="text-[9px] font-bold uppercase opacity-60">Ahorro IRPF (16%)</p>
                        <p id="res-hucha-irpf" class="text-lg font-bold">0,00 €</p>
                    </div>
                </div>
            </div>

            <div class="bg-[#32D74B] rounded-3xl p-6 text-black shadow-xl shadow-green-950/20">
                <div class="flex justify-between items-center">
                    <div>
                        <h3 class="text-[11px] font-black uppercase tracking-widest opacity-60">Sueldo Limpio Real</h3>
                        <p id="res-limpio" class="text-4xl font-black">0,00 €</p>
                    </div>
                    <i class="fas fa-wallet text-3xl opacity-30"></i>
                </div>
            </div>
        </div>

        <button onclick="saveFactura()" class="btn-save shadow-2xl">
            Guardar Factura
        </button>

        <div class="mt-10 pb-10">
            <div class="flex justify-between items-end px-2 mb-4">
                <h2 class="text-xl font-bold">Historial <span id="label-t" class="text-blue-500">1T</span></h2>
                <button onclick="exportCSV()" class="text-blue-500 font-bold text-sm">Exportar CSV</button>
            </div>
            <div id="historial" class="space-y-3 text-sm">
                </div>
        </div>
    </main>

    <script>
        let trim = Math.floor(new Date().getMonth() / 3) + 1;
        let db = JSON.parse(localStorage.getItem('factu_ios_2026')) || [];

        function setTrim(t) {
            trim = t;
            document.querySelectorAll('.trim-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('t'+t).classList.add('active');
            document.getElementById('label-t').innerText = t + 'T';
            render();
        }

        document.getElementById('base').addEventListener('input', function() {
            const bi = parseFloat(this.value) || 0;
            const iva = bi * 0.21;
            const irpf = bi * 0.15;
            const totalRecibido = bi + iva - irpf;
            
            // Lógica Excel exacta
            const ahorroIva = iva * 0.30;
            const ahorroIrpf = bi * 0.16;
            const totalHucha = ahorroIva + ahorroIrpf;
            const sueldoLimpio = totalRecibido - totalHucha;
            
            const fmt = (n) => n.toLocaleString('es-ES', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' €';
            
            document.getElementById('res-total').innerText = fmt(totalRecibido);
            document.getElementById('res-iva').innerText = fmt(iva);
            document.getElementById('res-irpf').innerText = fmt(irpf);
            document.getElementById('res-hucha').innerText = fmt(totalHucha);
            document.getElementById('res-hucha-iva').innerText = fmt(ahorroIva);
            document.getElementById('res-hucha-irpf').innerText = fmt(ahorroIrpf);
            document.getElementById('res-limpio').innerText = fmt(sueldoLimpio);
        });

        function saveFactura() {
            const c = document.getElementById('cliente').value;
            const bi = parseFloat(document.getElementById('base').value) || 0;
            if(!c || !bi) return;

            db.push({
                t: trim,
                c: c,
                n: document.getElementById('nfactura').value || 'S/N',
                bi: bi,
                fecha: new Date().toLocaleDateString('es-ES')
            });
            
            localStorage.setItem('factu_ios_2026', JSON.stringify(db));
            
            // Reset
            document.getElementById('base').value = '';
            document.getElementById('nfactura').value = '';
            document.dispatchEvent(new Event('input', { bubbles: true })); // Reset visual
            render();
        }

        function render() {
            const box = document.getElementById('historial');
            const filtered = db.filter(f => f.t === trim).reverse();
            box.innerHTML = filtered.length ? '' : '<p class="text-center text-gray-600 py-10 italic">No hay registros</p>';
            
            filtered.forEach(f => {
                const total = f.bi + (f.bi * 0.21) - (f.bi * 0.15);
                box.innerHTML += `
                    <div class="glass p-4 rounded-2xl flex justify-between items-center factura-item">
                        <div>
                            <p class="font-bold text-white">${f.c}</p>
                            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">${f.n} • ${f.fecha}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-blue-400">${total.toFixed(2)} €</p>
                        </div>
                    </div>`;
            });
        }

        function exportCSV() {
            const data = db.filter(f => f.t === trim);
            if(!data.length) return;
            let csv = "\ufeffFecha;Factura;Cliente;Base;IVA;IRPF\n";
            data.forEach(f => {
                csv += `${f.fecha};${f.n};${f.c};${f.bi.toFixed(2)};${(f.bi*0.21).toFixed(2)};${(f.bi*0.15).toFixed(2)}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Facturas_${trim}T_2026.csv`;
            a.click();
        }

        setTrim(trim);
    </script>
</body>
</html>
