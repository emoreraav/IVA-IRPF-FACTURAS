<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Facturas 2026</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1043/1043431.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #F2F2F7; padding-top: env(safe-area-inset-top); }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-b: 1px solid #D1D1D6; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .input-ios { background: #E9E9EB; border-radius: 12px; padding: 15px; width: 100%; border: none; font-size: 17px; outline: none; margin-top: 5px; margin-bottom: 15px; }
        .label-ios { font-size: 12px; font-weight: 700; color: #8E8E93; text-transform: uppercase; margin-left: 5px; }
        .tab-btn { flex: 1; padding: 10px; font-size: 13px; font-weight: 700; border-radius: 8px; transition: 0.2s; }
        .tab-btn.active { background: #007AFF; color: white; }
        .btn-black { background: #000; color: #fff; border-radius: 18px; width: 100%; padding: 20px; font-weight: 700; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body class="pb-10">

    <header class="glass-header sticky top-0 z-50 p-4">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <h1 class="text-xl font-extrabold">Factura Nueva</h1>
            <div id="trim-selector" class="flex bg-[#E3E3E8] rounded-lg p-1 w-48">
                <button onclick="setTrim(1)" id="t1" class="tab-btn">1T</button>
                <button onclick="setTrim(2)" id="t2" class="tab-btn">2T</button>
                <button onclick="setTrim(3)" id="t3" class="tab-btn">3T</button>
                <button onclick="setTrim(4)" id="t4" class="tab-btn">4T</button>
            </div>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <div class="card">
            <label class="label-ios">Cliente</label>
            <input type="text" id="cliente" list="c-list" class="input-ios" placeholder="Nombre...">
            <datalist id="c-list">
                <option value="BLOCK AUDIOVISUALS SL">
                <option value="ALBA AUDIOVISUALS BARCELONA SL">
                <option value="SH TECHNICAL CREW S.L.">
            </datalist>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="label-ios">Nº Factura</label>
                    <input type="text" id="nfactura" class="input-ios" placeholder="2026-XX">
                </div>
                <div class="w-1/2">
                    <label class="label-ios">Base (€)</label>
                    <input type="number" id="base" inputmode="decimal" class="input-ios font-bold text-blue-600" placeholder="0.00">
                </div>
            </div>
        </div>

        <div class="card !p-0 overflow-hidden border-none">
            <div class="p-5">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-gray-500 font-medium">Total a Recibir</span>
                    <span id="res-total" class="text-xl font-bold text-blue-600">0,00 €</span>
                </div>
                <div class="flex justify-between text-[11px] text-gray-400 font-bold uppercase tracking-wider">
                    <span>IVA: <span id="res-iva">0,00</span></span>
                    <span>IRPF: <span id="res-irpf">0,00</span></span>
                </div>
            </div>
            
            <div class="bg-[#00BCD4] p-6 text-white">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-[11px] font-bold uppercase opacity-80">Reserva Hucha (30% IVA + 16% BI)</p>
                        <p id="res-hucha" class="text-3xl font-black">0,00 €</p>
                    </div>
                    <i class="fas fa-piggy-bank text-3xl opacity-30"></i>
                </div>
            </div>

            <div class="bg-[#4CAF50] p-6 text-white">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-[11px] font-bold uppercase opacity-80">Sueldo Limpio Real</p>
                        <p id="res-limpio" class="text-3xl font-black">0,00 €</p>
                    </div>
                    <i class="fas fa-wallet text-3xl opacity-30"></i>
                </div>
            </div>
        </div>

        <button onclick="saveFactura()" class="btn-black active:scale-95 transition-transform">
            Guardar Factura
        </button>

        <div class="mt-10">
            <div class="flex justify-between items-center px-2 mb-4">
                <h2 class="text-lg font-bold">Historial <span id="label-t">1T</span></h2>
                <button onclick="exportCSV()" class="text-blue-600 font-bold text-sm">Exportar CSV</button>
            </div>
            <div id="historial" class="space-y-3"></div>
        </div>
    </main>

    <script>
        let trim = Math.floor(new Date().getMonth() / 3) + 1;
        let db = JSON.parse(localStorage.getItem('factu_v3')) || [];

        function setTrim(t) {
            trim = t;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('t'+t).classList.add('active');
            document.getElementById('label-t').innerText = t + 'T';
            render();
        }

        document.getElementById('base').addEventListener('input', function() {
            const bi = parseFloat(this.value) || 0;
            const iva = bi * 0.21;
            const irpf = bi * 0.15;
            const total = bi + iva - irpf;
            const hucha = (iva * 0.30) + (bi * 0.16);
            
            document.getElementById('res-total').innerText = total.toLocaleString('es-ES') + ' €';
            document.getElementById('res-iva').innerText = iva.toFixed(2) + ' €';
            document.getElementById('res-irpf').innerText = irpf.toFixed(2) + ' €';
            document.getElementById('res-hucha').innerText = hucha.toLocaleString('es-ES') + ' €';
            document.getElementById('res-limpio').innerText = (total - hucha).toLocaleString('es-ES') + ' €';
        });

        function saveFactura() {
            const c = document.getElementById('cliente').value;
            const bi = parseFloat(document.getElementById('base').value) || 0;
            if(!c || !bi) return alert('Faltan datos');

            db.push({ t: trim, c, n: document.getElementById('nfactura').value, bi, d: new Date().toLocaleDateString() });
            localStorage.setItem('factu_v3', JSON.stringify(db));
            
            document.getElementById('base').value = '';
            document.getElementById('nfactura').value = '';
            render();
        }

        function render() {
            const box = document.getElementById('historial');
            const filtered = db.filter(f => f.t === trim).reverse();
            box.innerHTML = filtered.length ? '' : '<p class="text-center text-gray-400 py-10">Vacío</p>';
            filtered.forEach(f => {
                const total = f.bi + (f.bi * 0.21) - (f.bi * 0.15);
                box.innerHTML += `<div class="card flex justify-between items-center mb-2">
                    <div><p class="font-bold text-sm">${f.c}</p><p class="text-[10px] text-gray-400 uppercase">${f.n} - ${f.d}</p></div>
                    <p class="font-bold text-blue-600">${total.toFixed(2)}€</p>
                </div>`;
            });
        }

        function exportCSV() {
            let csv = "Fecha;Cliente;Base\n";
            db.filter(f => f.t === trim).forEach(f => csv += `${f.d};${f.c};${f.bi}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Facturas_${trim}T.csv`;
            a.click();
        }

        setTrim(trim);
    </script>
</body>
</html>
